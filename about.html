<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapasya Web | Deep Focus</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap"
        rel="stylesheet">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>

    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #121212;
            --primary-color: #BB86FC;
            --secondary-color: #03DAC6;
            --error-color: #CF6679;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent-glow: rgba(187, 134, 252, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Premium Glow Background */
        body::before {
            content: '';
            position: fixed;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 150%;
            height: 400px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        header {
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .header-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .auth-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface-color);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        #user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Clock Section */
        .clock-container {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        #waveCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(187, 134, 252, 0.3);
            background: rgba(18, 18, 18, 0.5);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .timer-overlay {
            z-index: 10;
            text-align: center;
        }

        #timer-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 52px;
            font-weight: 700;
            margin-bottom: 4px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        #status-text {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 16px;
            margin-bottom: 48px;
        }

        .btn {
            border: none;
            outline: none;
            cursor: pointer;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: #000;
        }

        .btn-secondary {
            background-color: var(--surface-color);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-error {
            background-color: var(--error-color);
            color: #fff;
        }

        /* History Section */
        .history-section {
            width: 100%;
            background: var(--surface-color);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .history-title {
            font-size: 18px;
            font-weight: 700;
        }

        #session-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .session-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-info h4 {
            font-size: 15px;
            margin-bottom: 4px;
        }

        .session-info p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .session-time {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: var(--primary-color);
        }

        /* Glassmorphism Sync Dialog */
        #sync-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(187, 134, 252, 0.9);
            color: #000;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            z-index: 100;
            transition: transform 0.5s ease;
        }

        #sync-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 480px) {
            .clock-container {
                width: 280px;
                height: 280px;
            }

            #timer-text {
                font-size: 42px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-title">Tapasya</div>
        <div class="auth-section">
            <div id="user-info">
                <img id="user-avatar" src="" alt="">
                <span id="user-name"></span>
            </div>
            <div id="g_id_signin"></div>
            <button id="btn-sync" class="btn btn-secondary"
                style="padding: 8px 12px; font-size: 12px; border-radius: 10px; display: none;">
                Sync Now
            </button>
        </div>
    </header>

    <main>
        <div class="clock-container">
            <canvas id="waveCanvas"></canvas>
            <div class="timer-overlay">
                <div id="timer-text">00:00:00</div>
                <div id="status-text">Ready</div>
            </div>
        </div>

        <div class="controls">
            <button id="btn-main" class="btn btn-primary">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z" />
                </svg>
                <span>Start</span>
            </button>
            <button id="btn-stop" class="btn btn-error" style="display: none;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 6h12v12H6z" />
                </svg>
                <span>Stop</span>
            </button>
        </div>

        <section class="history-section">
            <div class="history-header">
                <h3 class="history-title">Recent Sessions</h3>
                <span id="sync-status" style="font-size: 12px; color: var(--text-secondary);">Last synced: Never</span>
            </div>
            <div id="session-list">
                <!-- Session items will be injected here -->
                <div style="text-align: center; color: var(--text-secondary); padding: 20px;">
                    No sessions recorded today
                </div>
            </div>
        </section>
    </main>

    <div id="sync-toast">Syncing to Cloud...</div>

    <script>
        // CONFIG
        const CLIENT_ID = '163374197397-mkmhn9trpthu5f9imrkgtjo52rrnb1sh.apps.googleusercontent.com';
        const FOLDER_NAME = 'Reality_Tapasya';
        const FILE_NAME = 'tapasya_daily_data.json';

        // STATE
        let state = {
            isActive: false,
            isRunning: false,
            startTime: 0,
            elapsedAccumulated: 0,
            pauseStartTime: 0,
            totalPause: 0,
            name: 'Deep Focus',
            target: 60 * 60 * 1000,
            lastUpdatedSync: 0,
            sessions: []
        };

        // UI ELEMENTS
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        const timerText = document.getElementById('timer-text');
        const statusText = document.getElementById('status-text');
        const btnMain = document.getElementById('btn-main');
        const btnStop = document.getElementById('btn-stop');
        const sessionList = document.getElementById('session-list');

        // INITIALIZE CANVAS
        function initCanvas() {
            canvas.width = canvas.offsetWidth * window.devicePixelRatio;
            canvas.height = canvas.offsetHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        // WAVE ANIMATION
        let offset = 0;
        function drawWave() {
            const w = canvas.offsetWidth;
            const h = canvas.offsetHeight;
            const progress = state.isActive ? Math.min(calculateElapsed() / state.target, 1) : 0.05;

            ctx.clearRect(0, 0, w, h);

            // Draw background fill
            ctx.fillStyle = '#121212';
            ctx.beginPath();
            ctx.arc(w / 2, h / 2, w / 2, 0, Math.PI * 2);
            ctx.fill();

            // Wave height calculation
            const waveHeight = h * (1 - progress);

            ctx.save();
            ctx.beginPath();
            ctx.arc(w / 2, h / 2, w / 2 - 2, 0, Math.PI * 2);
            ctx.clip();

            // Draw Waves
            drawSineWave(w, h, waveHeight, offset, '#BB86FC');
            drawSineWave(w, h, waveHeight, offset + 100, 'rgba(187, 134, 252, 0.5)');

            ctx.restore();

            offset += 0.05;
            requestAnimationFrame(drawWave);
        }

        function drawSineWave(w, h, waveHeight, shift, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(0, h);
            for (let x = 0; x <= w; x++) {
                const y = Math.sin(x * 0.02 + shift) * 5 + waveHeight;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(w, h);
            ctx.fill();
        }

        // CORE LOGIC (ZERO-BACKGROUND PORT)
        function calculateElapsed() {
            if (!state.isActive) return 0;
            if (state.isRunning) {
                return state.elapsedAccumulated + (Date.now() - state.startTime);
            }
            return state.elapsedAccumulated;
        }

        function updateUI() {
            const elapsed = calculateElapsed();
            timerText.innerText = formatTime(elapsed);

            if (!state.isActive) {
                statusText.innerText = "Ready";
                btnMain.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg><span>Start</span>`;
                btnStop.style.display = 'none';
            } else if (state.isRunning) {
                statusText.innerText = "Focusing...";
                btnMain.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg><span>Pause</span>`;
                btnStop.style.display = 'flex';
            } else {
                statusText.innerText = "Paused";
                btnMain.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg><span>Resume</span>`;
                btnStop.style.display = 'flex';
            }
        }

        function formatTime(ms) {
            const h = Math.floor(ms / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // LOAD LOCAL STATE
        function loadLocalState() {
            const saved = localStorage.getItem('tapasya_web_state');
            if (saved) {
                const parsed = JSON.parse(saved);
                // Important: Verify if session is old (from previous day)
                const now = new Date();
                const sessionDate = new Date(parsed.startTime || Date.now());
                if (now.toDateString() === sessionDate.toDateString()) {
                    state = { ...state, ...parsed };
                }
            }
            renderHistory();
        }

        function saveLocalState() {
            localStorage.setItem('tapasya_web_state', JSON.stringify(state));
        }

        // CONTROL HANDLERS
        btnMain.onclick = () => {
            if (!state.isActive) {
                // START
                state.isActive = true;
                state.isRunning = true;
                state.startTime = Date.now();
                state.elapsedAccumulated = 0;
            } else if (state.isRunning) {
                // PAUSE
                state.elapsedAccumulated += (Date.now() - state.startTime);
                state.isRunning = false;
                state.pauseStartTime = Date.now();
            } else {
                // RESUME
                state.isRunning = true;
                state.startTime = Date.now();
            }
            saveLocalState();
            updateUI();
        };

        btnStop.onclick = () => {
            if (state.isRunning) {
                state.elapsedAccumulated += (Date.now() - state.startTime);
            }

            // Save to history
            const session = {
                name: state.name,
                startTime: state.startTime - state.elapsedAccumulated, // Simple approximation
                endTime: Date.now(),
                duration: state.elapsedAccumulated
            };
            state.sessions.unshift(session);

            // Reset
            state.isActive = false;
            state.isRunning = false;
            state.elapsedAccumulated = 0;

            saveLocalState();
            renderHistory();
            updateUI();

            // Sync after stop
            if (gapi.client.drive) syncToDrive();
        };

        function renderHistory() {
            if (state.sessions.length === 0) {
                sessionList.innerHTML = `<div style="text-align: center; color: var(--text-secondary); padding: 20px;">No sessions recorded today</div>`;
                return;
            }

            sessionList.innerHTML = state.sessions.map(s => `
                <div class="session-item">
                    <div class="session-info">
                        <h4>${s.name}</h4>
                        <p>${new Date(s.endTime).toLocaleTimeString()}</p>
                    </div>
                    <div class="session-time">${formatTime(s.duration)}</div>
                </div>
            `).join('');
        }

        // GOOGLE DRIVE INTEGRATION
        let tokenClient;
        let accessToken = null;

        function handleCredentialResponse(response) {
            console.log("GSI Response Received");
            try {
                const payload = JSON.parse(atob(response.credential.split('.')[1]));
                document.getElementById('user-name').innerText = payload.name;
                document.getElementById('user-avatar').src = payload.picture;
                document.getElementById('g_id_signin').style.display = 'none';
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('btn-sync').style.display = 'block';

                initTokenClient();
            } catch (e) {
                console.error("Payload decode failed", e);
            }
        }

        function initTokenClient() {
            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/drive.file',
                    callback: (response) => {
                        if (response.error !== undefined) {
                            console.error("Token Client Error:", response);
                            alert("Google Error: " + response.error);
                            throw (response);
                        }
                        accessToken = response.access_token;
                        console.log("Access Token acquired");
                        syncToDrive();
                    },
                });
                initGapi();
            } catch (err) {
                console.error("Token Client Init Failed:", err);
            }
        }

        function initGapi() {
            gapi.load('client', async () => {
                try {
                    await gapi.client.init({});
                    await gapi.client.load('drive', 'v3');
                    console.log("GAPI Drive loaded successfully");
                } catch (err) {
                    console.error("GAPI Init Error:", err);
                }
            });
        }

        async function syncToDrive() {
            if (!accessToken) {
                tokenClient.requestAccessToken({ prompt: 'none' });
                return;
            }

            const toast = document.getElementById('sync-toast');
            toast.classList.add('show');

            try {
                // 1. Find or Create Folder
                let folderId = await getOrCreateFolder(FOLDER_NAME);

                // 2. Find File
                let fileId = await findFile(FILE_NAME, folderId);

                // 3. Prepare Data
                const syncData = {
                    lastUpdated: Date.now(),
                    sessions: state.sessions,
                    activeState: state.isActive ? {
                        isSessionActive: state.isActive,
                        isRunning: state.isRunning,
                        elapsedTimeMs: calculateElapsed(),
                        sessionName: state.name,
                        targetTimeMs: state.target
                    } : null
                };

                // 4. Download and Merge if exists
                if (fileId) {
                    const cloudData = await downloadFile(fileId);
                    if (cloudData && cloudData.lastUpdated > state.lastUpdatedSync) {
                        // Cloud is newer, merge or update local
                        mergeData(cloudData);
                    }
                }

                // 5. Upload New Version
                await uploadFile(FILE_NAME, syncData, folderId, fileId);

                state.lastUpdatedSync = Date.now();
                document.getElementById('sync-status').innerText = `Last synced: ${new Date().toLocaleTimeString()}`;
                saveLocalState();
            } catch (err) {
                console.error("Sync Error:", err);
                alert("Sync failed: " + (err.message || "Unknown error"));
            } finally {
                setTimeout(() => toast.classList.remove('show'), 1000);
            }
        }

        async function getOrCreateFolder(name) {
            const res = await gapi.client.drive.files.list({
                q: `name = '${name}' and mimeType = 'application/vnd.google-apps.folder' and trashed = false`,
                fields: 'files(id)',
                spaces: 'drive'
            });
            if (res.result.files.length > 0) return res.result.files[0].id;

            const folderRes = await gapi.client.drive.files.create({
                resource: { name: name, mimeType: 'application/vnd.google-apps.folder' },
                fields: 'id'
            });
            return folderRes.result.id;
        }

        async function findFile(name, folderId) {
            const res = await gapi.client.drive.files.list({
                q: `name = '${name}' and '${folderId}' in parents and trashed = false`,
                fields: 'files(id)',
                spaces: 'drive'
            });
            return res.result.files.length > 0 ? res.result.files[0].id : null;
        }

        async function downloadFile(id) {
            const res = await gapi.client.drive.files.get({
                fileId: id,
                alt: 'media'
            });
            return res.result;
        }

        async function uploadFile(name, content, folderId, existingFileId) {
            const boundary = '-------314159265358979323846';
            const delimiter = "\r\n--" + boundary + "\r\n";
            const close_delim = "\r\n--" + boundary + "--";

            const metadata = {
                name: name,
                mimeType: 'application/json',
                parents: [folderId]
            };

            const multipartRequestBody =
                delimiter +
                'Content-Type: application/json\r\n\r\n' +
                JSON.stringify(metadata) +
                delimiter +
                'Content-Type: application/json\r\n\r\n' +
                JSON.stringify(content) +
                close_delim;

            if (existingFileId) {
                // UPDATE
                return fetch(`https://www.googleapis.com/upload/drive/v3/files/${existingFileId}?uploadType=multipart`, {
                    method: 'PATCH',
                    headers: new Headers({
                        'Authorization': 'Bearer ' + accessToken,
                        'Content-Type': 'multipart/related; boundary=' + boundary
                    }),
                    body: multipartRequestBody
                });
            } else {
                // CREATE
                return fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: new Headers({
                        'Authorization': 'Bearer ' + accessToken,
                        'Content-Type': 'multipart/related; boundary=' + boundary
                    }),
                    body: multipartRequestBody
                });
            }
        }

        function mergeData(cloud) {
            // Very simple merge: Combine sessions and unique them by sessionId/timestamp
            const localSessions = state.sessions;
            const cloudSessions = cloud.sessions || [];

            // Deduplicate by endTime
            const all = [...localSessions, ...cloudSessions];
            const unique = [];
            const seen = new Set();
            for (const s of all) {
                if (!seen.has(s.endTime)) {
                    unique.push(s);
                    seen.add(s.endTime);
                }
            }
            state.sessions = unique.sort((a, b) => b.endTime - a.endTime);
            renderHistory();
        }

        document.getElementById('btn-sync').onclick = () => {
            if (!accessToken) {
                tokenClient.requestAccessToken();
            } else {
                syncToDrive();
            }
        };

        function logout() {
            google.accounts.id.disableAutoSelect();
            accessToken = null;
            document.getElementById('user-info').style.display = 'none';
            document.getElementById('g_id_signin').style.display = 'block';
            document.getElementById('btn-sync').style.display = 'none';
            console.log("Logged out");
        }

        document.getElementById('user-info').onclick = logout;

        // BOOTSTRAP
        window.onload = () => {
            initCanvas();
            loadLocalState();
            drawWave();

            // Periodic UI Update
            setInterval(updateUI, 1000);

            // Periodic Auto-Sync (Every 5 mins if active and logged in)
            setInterval(() => {
                if (state.isActive && state.isRunning && accessToken) {
                    syncToDrive();
                }
            }, 5 * 60 * 1000);

            google.accounts.id.initialize({
                client_id: CLIENT_ID,
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("g_id_signin"),
                { theme: "outline", size: "large" }
            );
        };

        window.onresize = initCanvas;
    </script>
</body>

</html>
